<style>

  .kicker { font-family: var(--font-mono); font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
            color: var(--ink-faint); margin: 0 0 10px; }
  .p { font-family: var(--font-body); font-size: 17px; line-height: 1.65; color: var(--ink-soft); max-width: 58ch; }
  .reveal { opacity: 0; transform: translateY(24px); }
  .seal { width: 46px; height: 46px; border-radius: 50%; background: var(--concept); position: relative;

  .seal::after { content: ""; position: absolute; inset: 11px; border-radius: 50%; border: 2.5px solid var(--paper); }

  .brand .s { width: 22px; height: 22px; border-radius: 50%; background: var(--concept); position: relative; }
  .brand .s::after { content:""; position:absolute; inset:5px; border-radius:50%; border:1.5px solid var(--paper); }
  .scrollcue { font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
               color: var(--ink-faint); display: inline-flex; align-items: center; gap: 8px; margin-top: 40px; }
  .scrollcue .arrow { animation: bob 1.6s var(--ease-in-out) infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(5px)} }
  .statrow { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .duo { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .bignum { font-family: var(--font-display); font-weight: 800; letter-spacing: -.03em; line-height: 1;
            color: var(--concept-deep); font-size: clamp(56px, 12vw, 104px); }
  .bignum .u { font-size: .4em; color: var(--ink-faint); font-weight: 700; }
  .chartcap { font-family: var(--font-body); font-style: italic; font-size: 15px; color: var(--ink-soft);
              margin-top: 14px; max-width: 60ch; }
  .note { font-family: var(--font-mono); font-size: 11px; letter-spacing: .04em; color: var(--ink-faint);
          margin-top: 10px; line-height: 1.5; }

  .dtable th { font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: .06em;

  .dtable td.hl { color: var(--concept-deep); font-weight: 800; }

// Scroll-linked spring reveal — Motion.dev inView + animate
function Reveal({ children, delay = 0, y = 24 }) {

              ]}
            />
            <p className="chartcap">Ni siquiera al 16% anual —optimista y arriesgado— el aporte fijo de 7M llega a 1.000M. El interés ayuda, pero no hace magia en 5 años.</p>
          </Card>
        </Reveal>
        <Reveal delay={0.1}>
          <div style={{ marginTop: 20 }}>
            <Table
              caption="Retorno requerido si SOLO se ahorra el salario (7M fijos)"
              head={[{ t: 'Meta a 5 años' }, { t: 'Factor', n: true }, { t: 'Retorno requerido', n: true }]}
              rows={[
                { d: ['500 M', '71,4×', '~ 7 %'] },
                { d: ['600 M', '85,7×', '~ 14 %'] },
                { d: ['700 M', '100×', '~ 19 %'] },
                { d: ['850 M', '121×', '~ 26 %'] },
                { d: [{ t: '1.000 M', h: true }, { t: '143×', h: true }, { t: '~ 32 % · irreal', h: true }], c: 'total' },
              ]}
            />
          </div>
        </Reveal>
        <Reveal delay={0.15}>
          <DataCard role="alert" roleLabel="La conclusión" icon="◑" title="Pedirle 32% anual al fondo es irreal" footer="VF anualidad · n=60 · aporte fijo 7M" elevation="md">
            Un 32% anual sostenido durante 5 años no existe como estrategia seria (ni Buffett promedió eso). La palanca no es exprimir el interés: es subir el aporte. Y subir el aporte sin bajar calidad de vida solo sale de un ingreso nuevo.
          </DataCard>
        </Reveal>
      </section>

      {/* CONTRIBUTION SIDE */}
      <section className="section">
        <Reveal>
          <p className="kicker">El otro lado de la ecuación</p>
          <h2 className="h2">Cuánto habría que aportar (al 11%)</h2>
          <p className="p" style={{ marginBottom: 24 }}>Fijando un retorno realista del 11%, este es el aporte mensual que exige cada meta a 5 años.</p>
        </Reveal>
        <Reveal delay={0.05}>
          <Table
            head={[{ t: 'Meta a 5 años' }, { t: 'Aporte mensual', n: true }, { t: 'Aporte total', n: true }]}
            rows={[
              { d: ['500 M', '6,3 M', '378 M'] },
              { d: [{ t: '622 M · porción salario', h: true }, { t: '7,8 M', h: true }, { t: '468 M', h: true }], c: 'sub' },
              { d: ['750 M', '9,4 M', '564 M'] },
              { d: [{ t: '1.000 M', h: true }, { t: '12,6 M', h: true }, { t: '756 M', h: true }], c: 'total' },
            ]}
          />
        </Reveal>
        <Reveal delay={0.1}>
          <p className="note" style={{ marginTop: 14 }}>12,6M de aporte mensual supera lo que deja el salario tras arriendo y vida. Por eso el sueldo solo no llega — y por eso aparece el segundo motor.</p>
        </Reveal>
      </section>

      {/* TWO ENGINES */}
      <section className="section">
        <Reveal>
          <p className="kicker">La estrategia</p>
          <h2 className="h2">Dos motores, no uno</h2>
          <p className="p" style={{ marginBottom: 24 }}>Mantener los empleos y, en paralelo, construir un activo digital. El salario sostiene la vida; el negocio cierra la brecha.</p>
        </Reveal>
        <Reveal delay={0.05}>
          <div className="duo">
            <DataCard role="action" roleLabel="Motor 1" icon="◍" title="Invertir el excedente" elevation="sm">
              7M/mes automatizados el día de pago, en cartera diversificada COP + global. Crece a ~9M/mes con el tiempo.
            </DataCard>
            <DataCard role="concept" roleLabel="Motor 2" icon="◎" title="Construir un activo digital" elevation="sm">
              Producto digital validado en paralelo. Su utilidad se reinvierte casi completa — la vida ya vive del salario.
            </DataCard>
          </div>
        </Reveal>
      </section>

      {/* PROJECTION */}
      <section className="section">
        <Reveal>
          <p className="kicker">La proyección</p>
          <h2 className="h2">El camino a los 1.000M</h2>
          <p className="p" style={{ marginBottom: 24 }}>Dos trayectorias a 5 años. La diferencia entre llegar y quedarse a mitad de camino es el segundo motor.</p>
        </Reveal>
        <Reveal delay={0.05}>
          <Card elevation="md" padding="var(--space-8)">
            <ProjectionChart />
            <p className="chartcap">Solo salario se estanca en ~622M. Con un negocio que escala a ~14M/mes reinvertidos hacia el año 5, la curva cruza la meta: ~1.039M.</p>
          </Card>
        </Reveal>
        <Reveal delay={0.1}>
          <div style={{ marginTop: 20 }}>
            <Table
              caption="Patrimonio a fin de año · millones COP"
              head={[{ t: 'Año' }, { t: 'Ap. salario', n: true }, { t: 'Ap. negocio', n: true }, { t: 'Solo salario', n: true }, { t: 'Sal.+negocio', n: true }]}
              rows={[
                { d: ['1', '84', '—', '89', '89'] },
                { d: ['2', '90', '24', '193', '219'] },
                { d: ['3', '96', '60', '316', '407'] },
                { d: ['4', '102', '108', '458', '674'] },
                { d: [{ t: '5' }, { t: '108' }, { t: '168' }, { t: '622' }, { t: '1.039', h: true }], c: 'total' },
              ]}
            />
          </div>
        </Reveal>
      </section>

      {/* CONTRIBUTION VS INTEREST */}
      <section className="section">
        <Reveal>
          <p className="kicker">El interés compuesto</p>
          <h2 className="h2">¿Cuánto pones tú y cuánto el interés?</h2>
          <p className="p" style={{ marginBottom: 24 }}>El patrimonio del escenario combinado, partido entre lo que aportas y lo que crece solo.</p>
        </Reveal>
        <Reveal delay={0.05}>
          <Card elevation="sm" padding="var(--space-8)">
            <GrowthChart />
            <p className="chartcap">El interés suma 5M el año 1 y 199M el año 5: es exponencial, pero su gran efecto llega después de 2031. En este plazo corto, el grueso del patrimonio es aporte — razón de más para no detenerse en la meta.</p>
          </Card>
        </Reveal>
      </section>

      {/* THE BUSINESS RAMP */}
      <section className="section">
        <Reveal>
          <p className="kicker">El motor que cierra la brecha</p>
          <h2 className="h2">Qué tiene que facturar el negocio</h2>
          <p className="p" style={{ marginBottom: 24 }}>La rampa de utilidad que lleva ~360M al portafolio entre los años 2 y 5. Empieza pequeña: el año 1 es solo validar.</p>
        </Reveal>
        <Reveal delay={0.05}>
          <Table
            caption="Utilidad del negocio · COP/mes y aporte anual al portafolio"
            head={[{ t: 'Año' }, { t: 'Utilidad bruta/mes', n: true }, { t: 'A inversión/mes', n: true }, { t: 'Al año', n: true }]}
            rows={[
              { d: ['1', 'validación', '—', '—'] },
              { d: ['2', '~ 3 M', '~ 2 M', '24 M'] },
              { d: ['3', '~ 7 M', '~ 5 M', '60 M'] },
              { d: ['4', '~ 13 M', '~ 9 M', '108 M'] },
              { d: [{ t: '5' }, { t: '~ 20 M' }, { t: '~ 14 M' }, { t: '168 M', h: true }], c: 'total' },
            ]}
          />
        </Reveal>
        <Reveal delay={0.1}>
          <DataCard role="concept" roleLabel="Aclaración" icon="◎" title="360M en 4 años, no de la nada" footer="~70% de la utilidad va a inversión; el resto, impuestos y reinversión" elevation="md">
            No es un salto: es una rampa que empieza chiquita y se reinvierte casi completa, porque la vida ya la paga el salario. Y el negocio, además, tiene valor de venta propio — upside no contado en la proyección.
          </DataCard>
        </Reveal>
      </section>

      {/* PHASED PLAN */}
      <section className="section">
        <Reveal>
          <p className="kicker">El método</p>
          <h2 className="h2">Tres fases, espaciadas</h2>
          <p className="p" style={{ marginBottom: 28 }}>Como un producto: por fases, con métricas, validando antes de escalar.</p>
        </Reveal>
        <Reveal delay={0.05}>
          <Card elevation="sm" padding="var(--space-8)">
            <TimelineRow index={1} accent="action" title="Cimientos · meses 1–12">Automatizar el ahorro, armar fondo de emergencia (~40M) y validar 1 idea digital con un MVP barato. Meta: primeros ingresos reales.</TimelineRow>
            <TimelineRow index={2} accent="action" title="Construir · años 2–3">Llevar el primer producto a 3–6M/mes y reinvertir el 100%. Sistematizar para que no dependa de tu tiempo.</TimelineRow>
            <TimelineRow marker="✓" accent="action" title="Escalar · años 4–5" last>El negocio supera al salario como motor: 14–20M/mes. Patrimonio ~1.000M + un activo con valor de venta propio.</TimelineRow>
          </Card>
        </Reveal>
      </section>

      {/* MYTH vs REALITY */}
      <section className="section">
        <Reveal>
          <p className="kicker">Principio de contraste</p>
          <h2 className="h2">Lo que parece riqueza y lo que la construye</h2>
        </Reveal>
        <Reveal delay={0.05}>
          <ComparisonGrid
            left={{ title: 'Ilusión', accent: 'alert', icon: '✕', bullet: '✕', items: ['Esperar a que suba el sueldo', 'Buscar un fondo que rinda 30%', 'Invertir solo lo que sobra'] }}
            right={{ title: 'Realidad', accent: 'action', icon: '✓', bullet: '✓', items: ['Construir un activo digital propio', 'Subir el aporte, no exprimir el interés', 'Automatizar el ahorro primero'] }}
          />
        </Reveal>
      </section>

      {/* CHECKPOINT */}
      <section className="section">
        <Reveal>
          <p className="kicker">Checkpoint</p>
          <Checkpoint
            question="Con un fondo al 11%, ¿basta con ahorrar el sueldo?"
            answer="No. Al 11%, 7M fijos rinden 557M y escalando a 9M llegan a ~622M: el 62% de la meta. Para que el fondo solo llegue a 1.000M tendría que rendir ~32% anual cada año durante 5 años — algo que no existe. La diferencia la pone un ingreso nuevo, no un interés mejor."
            accent="attention"
          />
        </Reveal>
      </section>

      {/* CLOSE */}
      <section className="section">
        <Reveal>
          <Card accent="concept" edge elevation="lg" padding="var(--space-10)">
            <p className="kicker" style={{ marginBottom: 14 }}>Lo que te llevas</p>
            <h2 className="h2" style={{ marginBottom: 16 }}>No necesitan ganar más. Necesitan construir un activo.</h2>
            <p className="p" style={{ marginBottom: 24 }}>El salario ya hace su parte si lo automatizan hoy. El millón se decide en lo que construyan en paralelo — empezando pequeño, esta semana.</p>
            <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'center' }}>
              <Button variant="primary" accent="concept" iconRight={<span>→</span>}>Siguiente: elegir tu primer producto digital</Button>
              <Badge accent="action" dot>Plan trazado</Badge>
            </div>
          </Card>
        </Reveal>
        <Reveal delay={0.05}>
          <p className="note" style={{ marginTop: 18 }}>Supuestos: 11% nominal anual · aportes crecientes · utilidad del negocio neta de impuestos. Cifras en COP. Es una proyección con supuestos, no una garantía.</p>
        </Reveal>
      </section>

      <div className="footer">
        <div className="eyebrow" style={{ color: 'var(--ink-faint)' }}>Hecho con Motion.dev · <a href="../../">infografías</a></div>
      </div>
    </>
  );
}

function SeriesProgress(){ return <ProgressDots total={5} current={1} accent="concept" label="1 / 5" />; }

ReactDOM.createRoot(document.getElementById('root')).render(<Infografia />);
ReactDOM.createRoot(document.getElementById('series-progress')).render(<SeriesProgress />);

const pf = document.getElementById('pf');
function onScroll(){
  const h = document.documentElement;
  const max = h.scrollHeight - h.clientHeight;
  const p = max > 0 ? h.scrollTop / max : 0;
  pf.style.transform = 'scaleX(' + p + ')';
}
window.addEventListener('scroll', onScroll, { passive: true });
onScroll();
</script>
</body>
</html>
