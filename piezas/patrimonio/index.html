:root {

  --paper-sunk:   #F2EBDF;
  --surface:      #FFFEFB;
  --surface-2:    #F6EFE5;
  --border:       #ECE3D5;
  --border-strong:#DBCFBD;
  --ink:          #3A343F;
  --ink-soft:     #6C6470;
  --ink-faint:    #9D9399;
  --deep:         #241E27;
  --deep-2:       #322A35;
  --ghost:        #F4EEE6;
  --ghost-soft:   #CBC2BD;

  /* ---- Semantic hues (cognitive roles) ---- */
  --concept:       #B7A4D2; --concept-tint:  #EEE8F3; --concept-deep:  #6B5887;
  --data:          #9CB2CE; --data-tint:     #E7ECF2; --data-deep:     #4E6486;
  --action:        #A6C3AB; --action-tint:   #E8F0E8; --action-deep:   #5B7F64;

  --brand: var(--concept); --brand-deep: var(--concept-deep); --brand-tint: var(--concept-tint);
  --bg: var(--paper); --bg-sunk: var(--paper-sunk); --surface-card: var(--surface);

  /* ---- Type ---- */

  --font-body:    'Spectral', Georgia, 'Times New Roman', serif;
  --font-mono:    'JetBrains Mono', 'SF Mono', Menlo, monospace;
  --measure: 65ch;

  /* ---- Spacing ---- */
  --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-5:20px;
  --space-6:24px; --space-8:32px; --space-10:40px; --space-12:48px; --space-16:64px;
  --space-20:80px; --space-24:96px; --space-32:128px;

<style>

            color: var(--ink-faint); margin: 0 0 10px; }
  .p { font-family: var(--font-body); font-size: 17px; line-height: 1.65; color: var(--ink-soft); max-width: 58ch; }
  .reveal { opacity: 0; transform: translateY(24px); }
  .seal { width: 46px; height: 46px; border-radius: 50%; background: var(--concept); position: relative;

  .seal::after { content: ""; position: absolute; inset: 11px; border-radius: 50%; border: 2.5px solid var(--paper); }
  .topbar { position: sticky; top: 0; z-index: 20; background: color-mix(in oklch, var(--paper) 88%, transparent);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
  .topbar .inner { max-width: var(--container-story); margin: 0 auto; padding: 12px 24px;

  .brand { display: flex; align-items: center; gap: 10px; font-family: var(--font-display);
           font-weight: 800; font-size: 18px; letter-spacing: -.02em; }
  .brand .s { width: 22px; height: 22px; border-radius: 50%; background: var(--concept); position: relative; }
  .brand .s::after { content:""; position:absolute; inset:5px; border-radius:50%; border:1.5px solid var(--paper); }
  .scrollcue { font-family: var(--font-mono); font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
               color: var(--ink-faint); display: inline-flex; align-items: center; gap: 8px; margin-top: 40px; }
  .scrollcue .arrow { animation: bob 1.6s var(--ease-in-out) infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(5px)} }
  .statrow { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .duo { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .bignum { font-family: var(--font-display); font-weight: 800; letter-spacing: -.03em; line-height: 1;

  .bignum .u { font-size: .4em; color: var(--ink-faint); font-weight: 700; }

// Scroll-linked spring reveal — Motion.dev inView + animate (stagger narrativo)
function Reveal({ children, delay = 0, y = 24 }) {

    if (!el || !M.inView || !M.animate) { if (el) { el.style.opacity = 1; el.style.transform = 'none'; } return; }

function BudgetChart() {

    x: { label: 'millones COP / mes →', domain: [0, 20], grid: true, ticks: 5 },
    y: { axis: null },

             range: ['var(--chart-1)', 'var(--chart-4)', 'var(--chart-3)'] },
    marks: [
      Plot.barX(data, { x: 'val', fill: 'cat', y: () => 'mes',
        order: ['Arriendo', 'Vida cómoda', 'Ahorro / inversión'], rx: 3, insetRight: 1 }),

}

          <p className="kicker">Principio de contraste</p>
          <h2 className="h2">Lo que parece riqueza y lo que la construye</h2>
        </Reveal>
        <Reveal delay={0.05}>
          <ComparisonGrid
            left={{ title: 'Ilusión', accent: 'alert', icon: '✕', bullet: '✕',
                    items: ['Esperar a que suba el sueldo', 'Buscar la idea perfecta antes de empezar', 'Invertir solo lo que sobra'] }}
            right={{ title: 'Realidad', accent: 'action', icon: '✓', bullet: '✓',
                    items: ['Construir un activo digital propio', 'Validar pequeño y barato, ya', 'Automatizar el ahorro primero'] }}
          />
        </Reveal>
      </section>

      {/* CHECKPOINT */}
      <section className="section">
        <Reveal>
          <p className="kicker">Checkpoint</p>
          <Checkpoint
            question="¿Por qué dos sueldos altos no bastan para 1.000M en 5 años?"
            answer="Porque el interés compuesto sobre 7M/mes, en 60 meses, multiplica por ~81 el aporte mensual — pero eso tope en ~622M. La meta exige más capital del que un salario fijo puede apartar. Solo un activo que crece aparte cierra la brecha."
            accent="attention"
          />
        </Reveal>
      </section>

      {/* CLOSE */}
      <section className="section">
        <Reveal>
          <Card accent="concept" edge elevation="lg" padding="var(--space-10)">
            <p className="kicker" style={{ marginBottom: 14 }}>Lo que te llevas</p>
            <h2 className="h2" style={{ marginBottom: 16 }}>No necesitan ganar más. Necesitan construir un activo.</h2>
            <p className="p" style={{ marginBottom: 24 }}>El salario ya hace su parte si lo automatizan hoy. El millón se decide en lo que construyan en paralelo — empezando pequeño, esta semana.</p>
            <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'center' }}>
              <Button variant="primary" accent="concept" iconRight={<span>→</span>}>Siguiente: elegir tu primer producto digital</Button>
              <Badge accent="action" dot>Plan trazado</Badge>
            </div>
          </Card>
        </Reveal>
      </section>

      <div className="footer">
        <div className="eyebrow" style={{ color: 'var(--ink-faint)' }}>Hecho con Motion.dev · <a href="../../">infografías</a></div>
      </div>
    </>
  );
}

function SeriesProgress(){ return <ProgressDots total={5} current={1} accent="concept" label="1 / 5" />; }

ReactDOM.createRoot(document.getElementById('root')).render(<Infografia />);
ReactDOM.createRoot(document.getElementById('series-progress')).render(<SeriesProgress />);

const pf = document.getElementById('pf');
function onScroll(){
  const h = document.documentElement;
  const max = h.scrollHeight - h.clientHeight;
  const p = max > 0 ? h.scrollTop / max : 0;
  pf.style.transform = 'scaleX(' + p + ')';
}
window.addEventListener('scroll', onScroll, { passive: true });
onScroll();
</script>
